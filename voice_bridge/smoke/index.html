<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voice-bridge · smoke</title>
    <!-- 火山 RTC Web SDK；版本与 spike 期一致 -->
    <script
      crossorigin
      src="https://unpkg.com/@volcengine/rtc@4.66.20/index.min.js"
    ></script>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        max-width: 720px;
        margin: 32px auto;
        padding: 16px;
        line-height: 1.6;
      }
      label {
        display: block;
        margin: 12px 0 4px;
        color: #333;
      }
      input,
      button,
      textarea {
        font-size: 14px;
      }
      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 16px;
        margin-right: 8px;
        margin-top: 8px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      pre {
        background: #f5f5f5;
        padding: 12px;
        max-height: 320px;
        overflow: auto;
      }
      .row {
        margin: 16px 0;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        background: #eee;
        font-size: 12px;
        font-weight: 600;
      }
      .pill[data-state="active"] {
        background: #cce8d3;
      }
      .pill[data-state="stopped"] {
        background: #ddd;
      }
      .pill[data-state="error"] {
        background: #f5c6c6;
      }
      .warn {
        padding: 8px 12px;
        background: #fff8d2;
        border-left: 4px solid #d4a300;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .meter {
        width: 100%;
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: #eee;
        margin: 8px 0;
      }
      .meter-fill {
        width: 0%;
        height: 100%;
        background: #2f9e44;
        transition: width 80ms linear;
      }
      .hint {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h2>voice-bridge · smoke client</h2>
    <div class="warn">
      非产品代码——仅供开发者在合规允许公网穿透的环境跑 007 voice-call 端到端验证。详见 <code>README.md</code>。
    </div>

    <div class="row">
      <label for="vb">voice_bridge URL</label>
      <input type="text" id="vb" value="http://127.0.0.1:18900" />
    </div>

    <div class="row">
      <label>可选：续上已有 session_id</label>
      <input type="text" id="sess" placeholder="留空则新建" />
    </div>

    <div class="row">
      <button id="btn-start">拨打通话</button>
      <button id="btn-stop" disabled>挂断</button>
      <span class="pill" data-state="-" id="state">未开始</span>
    </div>

    <div class="row">
      <label>本地麦克风诊断（不经过 RTC / 后端）</label>
      <button id="btn-mic-test">测试麦克风</button>
      <div class="meter"><div class="meter-fill" id="mic-meter"></div></div>
      <div class="hint" id="mic-status">未开始。点击测试后说话，音量应明显跳动。</div>
    </div>

    <div class="row">
      <label>调用日志</label>
      <pre id="log"></pre>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const log = (...args) => {
        const line = args
          .map((a) => (typeof a === "string" ? a : JSON.stringify(a, null, 2)))
          .join(" ");
        $("log").textContent += line + "\n";
      };

      let engine = null;
      let currentCallId = null;
      let micMeter = null;

      function onRtc(eventName, handler) {
        const event = window.VERTC?.events?.[eventName];
        if (event) {
          engine.on(event, handler);
        } else {
          log("[rtc] 当前 SDK 未暴露事件:", eventName);
        }
      }

      function setState(s) {
        const pill = $("state");
        pill.textContent = s;
        pill.dataset.state = s;
      }

      async function postJson(url, body) {
        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {}),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(`${resp.status}: ${JSON.stringify(data)}`);
        return data;
      }

      function stopMicMeter() {
        if (!micMeter) return;
        cancelAnimationFrame(micMeter.frame);
        micMeter.stream.getTracks().forEach((track) => track.stop());
        micMeter.audioContext.close().catch(() => {});
        micMeter = null;
        $("mic-meter").style.width = "0%";
        $("mic-status").textContent = "麦克风诊断已停止。";
      }

      async function startMicMeter() {
        if (micMeter) return;
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
          video: false,
        });
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);

        const samples = new Uint8Array(analyser.fftSize);
        micMeter = { stream, audioContext, analyser, samples, frame: 0, peak: 0 };

        const tick = () => {
          analyser.getByteTimeDomainData(samples);
          let sum = 0;
          for (const sample of samples) {
            const centered = (sample - 128) / 128;
            sum += centered * centered;
          }
          const rms = Math.sqrt(sum / samples.length);
          micMeter.peak = Math.max(micMeter.peak, rms);
          const level = Math.min(100, Math.round(rms * 260));
          const peak = Math.round(micMeter.peak * 260);
          $("mic-meter").style.width = `${level}%`;
          $("mic-status").textContent = `当前音量 ${level}% · 峰值 ${peak}%（说话时应跳动，安静时接近 0）`;
          micMeter.frame = requestAnimationFrame(tick);
        };
        tick();
        log("[mic] 本地麦克风诊断已启动");
      }

      async function startCall() {
        const vb = $("vb").value.trim();
        const sessionId = $("sess").value.trim() || undefined;
        $("btn-start").disabled = true;
        try {
          await startMicMeter();
          log("[start] POST /voice/calls ...");
          const data = await postJson(`${vb}/voice/calls`, {
            session_id: sessionId,
            defer_start: true,
          });
          log("[start] 拿到凭证:", data);
          currentCallId = data.call_id;
          setState(data.state);

          const VERTC = window.VERTC;
          if (!VERTC) throw new Error("火山 RTC SDK 未加载：window.VERTC 为空");
          log("[rtc] SDK version:", VERTC.getSdkVersion?.() || "unknown");

          const permission = await VERTC.enableDevices?.({ video: false, audio: true });
          log("[rtc] 设备授权:", permission || "skip");
          const audioInputs = (await VERTC.enumerateAudioCaptureDevices?.()) || [];
          log(
            "[rtc] 麦克风设备:",
            audioInputs.map((d) => ({ label: d.label, deviceId: d.deviceId, kind: d.kind })),
          );

          engine = VERTC.createEngine(data.rtc_app_id);
          onRtc("onError", (e) => {
            log("[rtc] error:", e);
          });
          onRtc("onUserJoined", (e) => {
            log("[rtc] 用户进房:", e);
          });
          onRtc("onUserLeave", (e) => {
            log("[rtc] 用户离房:", e);
          });
          onRtc("onUserPublishStream", (e) => {
            log("[rtc] 用户发布流:", e);
          });
          onRtc("onUserUnpublishStream", (e) => {
            log("[rtc] 用户取消发布:", e);
          });
          onRtc("onAudioDeviceStateChanged", (e) => {
            log("[rtc] 音频设备状态:", e);
          });
          onRtc("onLocalAudioPropertiesReport", (e) => {
            log("[rtc] 本地音量:", e);
          });
          await engine.joinRoom(
            data.token,
            data.room_id,
            {
              userId: data.user_id,
              extraInfo: JSON.stringify({
                call_scene: "RTC-AIGC",
                user_name: data.user_id,
                user_id: data.user_id,
              }),
            },
            {
              isAutoPublish: true,
              isAutoSubscribeAudio: true,
              roomProfileType: VERTC.RoomProfileType?.chat ?? 5,
            },
          );
          await engine.startAudioCapture();
          await engine.publishStream(VERTC.MediaType?.AUDIO ?? 1);
          log("[rtc] 已开始采集并发布麦克风音频");
          log("[rtc] 已加入房间", data.room_id, "as", data.user_id);
          log("[start-agent] POST /voice/calls/{id}/start-agent ...");
          const started = await postJson(`${vb}/voice/calls/${currentCallId}/start-agent`);
          log("[start-agent] AIGC 已启动:", started);
          setState(started.state);
          $("btn-stop").disabled = false;
        } catch (e) {
          log("[start] 失败:", String(e));
          setState("error");
          $("btn-start").disabled = false;
        }
      }

      async function stopCall() {
        const vb = $("vb").value.trim();
        if (!currentCallId) return;
        $("btn-stop").disabled = true;
        try {
          log("[stop] POST /voice/calls/{id}/stop ...");
          const data = await postJson(`${vb}/voice/calls/${currentCallId}/stop`);
          log("[stop] 完成:", data);
          setState(data.state);
          if (engine) {
            try {
              await engine.leaveRoom();
              window.VERTC.destroyEngine(engine);
            } catch (e) {
              log("[rtc] 清理引擎失败（忽略）:", String(e));
            }
            engine = null;
          }
          stopMicMeter();
        } catch (e) {
          log("[stop] 失败:", String(e));
        } finally {
          currentCallId = null;
          $("btn-start").disabled = false;
        }
      }

      $("btn-mic-test").addEventListener("click", async () => {
        try {
          if (micMeter) {
            stopMicMeter();
          } else {
            await startMicMeter();
          }
        } catch (e) {
          log("[mic] 诊断失败:", String(e));
          $("mic-status").textContent = `麦克风诊断失败：${String(e)}`;
        }
      });
      $("btn-start").addEventListener("click", startCall);
      $("btn-stop").addEventListener("click", stopCall);
    </script>
  </body>
</html>
